# ============================================================
# Code Shield 服务端配置
# ============================================================

# ── HTTP 服务 ──
server:
  port: ":8080"
  # external_url: "http://127.0.0.1:8080"  # 外部访问基准 URL（邮件等通知链接跳转，缺省默认为本地端口地址）
  # worker_count: 5              # 全局任务并发数，默认 5
  # gin_log: true                # 是否打印 GIN 请求日志，默认 false
  # read_timeout: 15s            # 读取请求超时
  # write_timeout: 15s           # 写入响应超时
  # idle_timeout: 60s            # keep-alive 空闲超时

# ── 数据存储 ──
storage:
  root: "."  # 数据根目录，下设 codes/ 和 reports/ 子目录

# ── AI 引擎 ──
ai:
  backend: "claude"              # CLI 后端：claude 或 opencode
  # debug_logs: true             # 是否输出 AI 引擎底层的 debug 级别日志，默认 false
  # output_format: "text"        # 输出格式：text 或 json，对 claude 为 text/stream-json，对 opencode 为 default/json，默认 text

# ── 通知服务 ──
notification:
  webhook: "http://127.0.0.1:8081/api/notify/email"  # 通知回调地址

# ── 认证 ──
auth:
  jwt_secret: ""                     # JWT 签名密钥（留空随机生成）
  password_login_enabled: true      # 是否启用密码登录

  oauth2:
    enabled: true                   # 是否启用 OAuth2 / OIDC 单点登录
    client_id: "code-shield"         # Client ID
    client_secret: ""                # Client Secret
    auth_url: "https://sso.yourcompany.com/realms/main/protocol/openid-connect/auth"
    token_url: "https://sso.yourcompany.com/realms/main/protocol/openid-connect/token"
    userinfo_url: "https://sso.yourcompany.com/realms/main/protocol/openid-connect/userinfo"
    redirect_url: ""                 # 回调地址，留空自动推导
    scopes: ["openid", "profile", "email"]
    admin_list: ["fugui", "admin@company.com"]  # SSO 登录自动提权为系统管理员的邮箱/用户名白名单列表
    field_mapping:
      username: "preferred_username"
      email: "email"
      name: "name"
      employee_id: "employee_id"
      unique_id: "unique_id"
      employee_type: "employee_type"

